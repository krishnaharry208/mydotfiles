#################################
#           Backend             #
#################################
backend = "glx";
vsync = true;

# Ryzen specific: prevents flickering during window resizing
use-damage = true;
glx-no-stencil = true;
glx-no-rebind-pixmap = true;

#################################
#          Animations           #
#################################
animations = ({
    triggers = ["open", "show"];
    preset = "appear";
    duration = 0.5; # Faster for snappier feel on Ryzen 3
    scale = 0.8;
}, {
    triggers = ["close", "hide"];
    preset = "disappear";
    duration = 0.5;
    scale = 0.8;
}, {
    triggers = ["geometry"];
    preset = "geometry-change";
    duration = 0.7;
})


#################################
#           Fading              #
#################################

# Enable fading
fading = true;

# Opacity change between steps while fading in (0.01 - 1.0, default 0.028)
# A slightly higher value (0.03) makes it feel faster.
fade-in-step = 0.03;

# Opacity change between steps while fading out (0.01 - 1.0, default 0.03)
fade-out-step = 0.03;

# The time between steps in fade step, in milliseconds (> 0, default 10)
# Lowering this to 5 or 8 makes the animation smoother on high refresh monitors.
fade-delta = 5;

# Do not fade on window open/close (optional)
# Set to true if you only want fading when switching focus or changing opacity.
no-fading-openclose = false;

# Specify a list of conditions of windows that should not be faded.
fade-exclude = [
  "class_g = 'i3-frame'", # Prevents weird ghosting on i3 borders
  "class_g = 'Cairo-clock'",
  "class_g = 'slop'"      # Exclude screen snip tools
];


#################################
#           Corners             #
#################################
corner-radius = 10;

#################################
#             Blur              #
#################################
blur: {
  method = "dual_kawase";
  strength = 4; # Lowered slightly to save GPU cycles on Vega 3
};

#################################
#            Rules              #
#################################

rules = (
  {
    match = "any";
    shadow = true;
    fade = true;
  },
  {
    match = "window_type = 'dock' || window_type = 'desktop' || class_g = 'i3-frame'";
    corner-radius = 0;
    blur-background = false;
    shadow = false;
  },
  {
    match = "focused";
    opacity = 1.0;
  },
  {
    match = "!focused";
    opacity = 0.88;
  },
  # Exclude heavy apps from blur to keep things fast
  {
    match = "class_g = 'Firefox' || class_g = 'vlc'";
    blur-background = false;
  }
)




# Enable rounded corners
corner-radius = 10
round-borders = true

# Enable transparency and shadows
shadow = true
shadow-radius = 15
shadow-offset-x = -15
shadow-offset-y = -15
shadow-opacity = 0.3

# Enable blur (optional for better effect)
blur-background = true
blur-background-frame = true
blur-background-fixed = true